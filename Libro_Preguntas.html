  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #dbeafe, #eff6ff, #f8fafc);
      color: #1f2937;
      padding: 20px;
    }

    .contenedor {
      max-width: 980px;
      margin: 0 auto;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    .cabecera {
      background: linear-gradient(135deg, #1d4ed8, #2563eb, #3b82f6);
      color: #fff;
      padding: 24px;
      text-align: center;
    }

    .cabecera h1 {
      margin: 0;
      font-size: 2rem;
    }

    .cabecera p {
      margin: 10px 0 0;
      opacity: 0.95;
    }

    .contenido {
      padding: 24px;
    }

    .panel-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .tarjeta-info {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 12px;
      padding: 14px;
      font-weight: bold;
      text-align: center;
      color: #1e3a8a;
    }

    .barra-progreso {
      width: 100%;
      height: 18px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .progreso {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      transition: width 0.4s ease;
    }

    .bloque {
      font-size: 0.95rem;
      color: #2563eb;
      font-weight: bold;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .pregunta {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 22px;
      line-height: 1.5;
    }

    .opciones {
      display: grid;
      gap: 14px;
      margin-bottom: 22px;
    }

    .opcion {
      display: block;
      padding: 16px;
      border-radius: 14px;
      border: 2px solid #dbeafe;
      background: #f8fbff;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 1rem;
    }

    .opcion:hover {
      background: #eff6ff;
      border-color: #60a5fa;
      transform: translateY(-1px);
    }

    .opcion input {
      margin-right: 10px;
      transform: scale(1.1);
    }

    .correcta {
      background: #dcfce7 !important;
      border-color: #22c55e !important;
      color: #166534;
    }

    .incorrecta {
      background: #fee2e2 !important;
      border-color: #ef4444 !important;
      color: #991b1b;
    }

    .botones {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      font-weight: bold;
    }

    .btn-principal {
      background: #2563eb;
      color: white;
    }

    .btn-principal:hover {
      background: #1d4ed8;
    }

    .btn-secundario {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-secundario:hover {
      background: #d1d5db;
    }

    .mensaje {
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      display: none;
      font-weight: bold;
    }

    .mensaje.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .mensaje.ok {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }

    .resultado {
      display: none;
      text-align: center;
      padding: 30px 10px 10px;
    }

    .resultado h2 {
      color: #047857;
      margin-bottom: 10px;
      font-size: 2rem;
    }

    .puntuacion-final {
      font-size: 1.4rem;
      font-weight: bold;
      color: #1d4ed8;
      margin: 18px 0;
    }

    .nota {
      font-size: 1.1rem;
      margin-bottom: 24px;
      color: #374151;
    }

    let preguntas = [];
    let indiceActual = 0;
    let aciertos = 0;
    let segundos = 0;
    let temporizadorIntervalo;

    const contadorEl = document.getElementById("contador");
    const aciertosEl = document.getElementById("aciertos");
    const temporizadorEl = document.getElementById("temporizador");
    const progresoEl = document.getElementById("progreso");
    const bloqueEl = document.getElementById("bloque");
    const preguntaEl = document.getElementById("pregunta");
    const opcionesEl = document.getElementById("opciones");
    const mensajeErrorEl = document.getElementById("mensajeError");
    const mensajeOkEl = document.getElementById("mensajeOk");
    const zonaQuizEl = document.getElementById("zonaQuiz");
    const resultadoEl = document.getElementById("resultado");
    const puntuacionFinalEl = document.getElementById("puntuacionFinal");
    const notaFinalEl = document.getElementById("notaFinal");
    const tiempoFinalEl = document.getElementById("tiempoFinal");

    function mezclarArray(array) {
      let copia = [...array];
      for (let i = copia.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copia[i], copia[j]] = [copia[j], copia[i]];
      }
      return copia;
    }

    function iniciarTemporizador() {
      clearInterval(temporizadorIntervalo);
      temporizadorIntervalo = setInterval(() => {
        segundos++;
        actualizarTemporizador();
      }, 1000);
    }

    function actualizarTemporizador() {
      const min = String(Math.floor(segundos / 60)).padStart(2, "0");
      const seg = String(segundos % 60).padStart(2, "0");
      temporizadorEl.textContent = `Tiempo: ${min}:${seg}`;
    }

    function actualizarProgreso() {
      const porcentaje = ((indiceActual) / preguntas.length) * 100;
      progresoEl.style.width = porcentaje + "%";
    }

    function ocultarMensajes() {
      mensajeErrorEl.style.display = "none";
      mensajeOkEl.style.display = "none";
      mensajeErrorEl.textContent = "";
      mensajeOkEl.textContent = "";
    }

    function cargarPregunta() {
      ocultarMensajes();

      const q = preguntas[indiceActual];
      contadorEl.textContent = `Pregunta ${indiceActual + 1} de ${preguntas.length}`;
      aciertosEl.textContent = `Aciertos: ${aciertos}`;
      actualizarProgreso();

      bloqueEl.textContent = q.bloque;
      preguntaEl.textContent = q.pregunta;
      opcionesEl.innerHTML = "";

      q.opciones.forEach((opcion, i) => {
        const label = document.createElement("label");
        label.className = "opcion";
        label.innerHTML = `
          <input type="radio" name="respuesta" value="${i}">
          ${opcion}
        `;
        opcionesEl.appendChild(label);
      });
    }

    function comprobarRespuesta() {
      ocultarMensajes();

      const seleccionada = document.querySelector('input[name="respuesta"]:checked');
      if (!seleccionada) {
        mensajeErrorEl.textContent = "Selecciona una opción";
        mensajeErrorEl.style.display = "block";
        return;
      }

      const respuesta = parseInt(seleccionada.value, 10);
      const correcta = preguntas[indiceActual].correcta;
      const labels = document.querySelectorAll(".opcion");

      labels.forEach(label => label.classList.remove("correcta", "incorrecta"));

      if (respuesta !== correcta) {
        labels[respuesta].classList.add("incorrecta");
        labels[correcta].classList.add("correcta");
        mensajeErrorEl.textContent = "Piénsalo bien";
        mensajeErrorEl.style.display = "block";
        return;
      }

      labels[correcta].classList.add("correcta");
      mensajeOkEl.textContent = "¡Correcto!";
      mensajeOkEl.style.display = "block";
      aciertos++;
      aciertosEl.textContent = `Aciertos: ${aciertos}`;

      setTimeout(() => {
        indiceActual++;
        if (indiceActual < preguntas.length) {
          cargarPregunta();
        } else {
          finalizarTest();
        }
      }, 700);
    }

    function obtenerNota(porcentaje) {
      if (porcentaje === 100) return "Excelente";
      if (porcentaje >= 85) return "Muy bien";
      if (porcentaje >= 70) return "Bien";
      if (porcentaje >= 50) return "Puedes mejorar";
      return "Conviene repasar";
    }

    function finalizarTest() {
      clearInterval(temporizadorIntervalo);
      progresoEl.style.width = "100%";
      zonaQuizEl.style.display = "none";
      resultadoEl.style.display = "block";

      const porcentaje = Math.round((aciertos / preguntas.length) * 100);
      const min = String(Math.floor(segundos / 60)).padStart(2, "0");
      const seg = String(segundos % 60).padStart(2, "0");

      puntuacionFinalEl.textContent = `Has acertado ${aciertos} de ${preguntas.length} preguntas (${porcentaje}%)`;
      notaFinalEl.textContent = `Resultado: ${obtenerNota(porcentaje)}`;
      tiempoFinalEl.textContent = `Tiempo total: ${min}:${seg}`;
    }

    function reiniciarTest() {
      preguntas = mezclarArray(bancoPreguntas);
      indiceActual = 0;
      aciertos = 0;
      segundos = 0;
      actualizarTemporizador();
      zonaQuizEl.style.display = "block";
      resultadoEl.style.display = "none";
      iniciarTemporizador();
      cargarPregunta();
    }

    reiniciarTest();
